<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/layout :: common-head"></th:block>
    <title>BookVerse - Seller Login</title>
</head>
<body>
<header>
    <nav class="navbar navbar-expand-sm bg-dark">
        <a class="navbar-brand" th:href="@{/}">
            <img src="/websitelogo.png" alt="BookVerse Logo" width="42" height="42" style="border-radius:8px;">
            <span class="brand-name">BookVerse</span>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/adminlog}">Login</a></li>
            </ul>
        </div>
    </nav>
</header>

<div id="topmid"><h1>Welcome to Online Book Store</h1></div>

<div th:if="${errorMsg}" class="alert alert-danger text-center" th:text="${errorMsg}" style="max-width:420px; margin:10px auto;"></div>

<form th:action="@{/adminlog}" method="post">
    <table class="tab">
        <tr>
            <td style="text-align:center; font-size:20px; font-weight:bold; padding-bottom:10px;">Admin Login</td>
        </tr>
        <tr>
            <td style="text-align:center;">
                <a th:href="@{/userlog}" style="font-size:14px;">Not an Admin? Click here to Login as Customer</a>
            </td>
        </tr>
        <tr>
            <td>
                <label for="username">Username:</label>
                <input type="text" name="username" id="username" placeholder="Enter your Username"><br><br>
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" placeholder="Enter Password"><br><br>
                <input class="btn btn-primary" type="submit" value="Login as Admin">
            </td>
        </tr>
    </table>
</form>
</body>
</html>
