<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/layout :: common-head"></th:block>
    <title>BookVerse - Store Books</title>
</head>
<body>
<header>
    <th:block th:replace="fragments/layout :: seller-nav" th:with="activePage='storebooks'"></th:block>
</header>

<div class="container">
    <div id="topmid">Books Available In the Store</div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <table class="table table-hover">
        <thead>
            <tr>
                <th>BookId</th>
                <th>Name</th>
                <th>Author</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${books == null or books.isEmpty()}">
                <th colspan="6" style="text-align:center;">No Books Available in the store</th>
            </tr>
            <tr th:each="book : ${books}">
                <td th:text="${book.barcode}"></td>
                <td th:text="${book.name}"></td>
                <td th:text="${book.author}"></td>
                <td>&#8377; <span th:text="${book.price}"></span></td>
                <td th:text="${book.quantity}"></td>
                <td>
                    <form method="get" th:action="@{/updatebook}">
                        <input type="hidden" name="bookId" th:value="${book.barcode}">
                        <button type="submit" class="btn btn-success btn-sm">Update</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
