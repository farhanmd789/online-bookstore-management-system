<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/layout :: common-head"></th:block>
    <title>BookVerse - Customer Login</title>
</head>
<body>
<header>
    <nav class="navbar navbar-expand-sm bg-dark">
        <a class="navbar-brand" th:href="@{/}">
            <img src="/websitelogo.png" alt="BookVerse Logo" width="42" height="42" style="border-radius:8px;">
            <span class="brand-name">BookVerse</span>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/userlog}">Login</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/userreg}">Register</a></li>
            </ul>
        </div>
    </nav>
</header>

<div id="topmid"><h1>Welcome to BookVerse</h1></div>

<div th:if="${errorMsg}" class="alert alert-danger text-center" th:text="${errorMsg}" style="max-width:420px; margin:10px auto;"></div>
<div th:if="${successMsg}" class="alert alert-success text-center" th:text="${successMsg}" style="max-width:420px; margin:10px auto;"></div>

<form th:action="@{/userlog}" method="post">
    <h2 style="text-align:center; color:#1a1a2e; margin-bottom:5px; border-bottom:3px solid #00d4ff; padding-bottom:10px;">Customer Login</h2>
    <p style="text-align:center; margin-bottom:20px;">
        <a th:href="@{/adminlog}">Are you a Seller? Click here to Login as Admin</a>
    </p>
    <label for="mailid">Email</label>
    <input type="text" name="mailid" id="mailid" placeholder="Enter your Email" required>
    <label for="password">Password</label>
    <input type="password" name="password" id="password" placeholder="Enter your Password" required>
    <input class="btn btn-primary" type="submit" value="Login">
    <p style="text-align:center; margin-top:16px;">
        <a th:href="@{/userreg}">New user? Register Here</a>
    </p>
</form>
</body>
</html>
