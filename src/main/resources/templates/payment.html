<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/layout :: common-head"></th:block>
    <title>BookVerse - Payment</title>
    <style>
        .row { display: flex; flex-wrap: wrap; margin: 0 -16px; }
        .col-25 { flex: 25%; padding: 0 16px; }
        .col-50 { flex: 50%; padding: 0 16px; }
        .col-75 { flex: 75%; padding: 0 16px; }
        .container { background: rgba(255,255,255,0.07); padding: 5px 20px 15px 20px; border: 1px solid rgba(0,212,255,0.3); border-radius: 8px; }
        input[type=text] { width: 100%; margin-bottom: 20px; padding: 12px; border: 1px solid #ccc; border-radius: 3px; }
        label { margin-bottom: 10px; display: block; }
        .btn { background-color: #00d4ff; color: #1a1a2e; padding: 12px; margin: 10px 0; border: 2px solid #00d4ff; width: 100%; border-radius: 6px; cursor: pointer; font-size: 17px; font-weight: 600; }
        .btn:hover { background-color: #0fa8cc; border-color: #0fa8cc; }
        span.price { float: right; color: #00d4ff; font-weight: bold; }
        @media (max-width: 800px) { .row { flex-direction: column-reverse; } .col-25 { margin-bottom: 20px; } }
    </style>
</head>
<body>
<header>
    <th:block th:replace="fragments/layout :: customer-nav" th:with="activePage='cart'"></th:block>
</header>

<div id="topmid">Cart Checkout</div>

<div class="container">
    <div class="row">
        <div class="col-75">
            <div class="container">
                <form th:action="@{/pay}" method="post">
                    <div class="row">
                        <div class="col-50">
                            <h3>Billing Address</h3>
                            <label for="fname">Full Name</label>
                            <input type="text" id="fname" name="firstname" placeholder="John M. Doe">
                            <label for="email">Email</label>
                            <input type="text" id="email" name="email" placeholder="john@example.com">
                            <label for="adr">Address</label>
                            <input type="text" id="adr" name="address" placeholder="542 W. 15th Street" required>
                            <label for="city">City</label>
                            <input type="text" id="city" name="city" placeholder="New York">
                            <div class="row">
                                <div class="col-50">
                                    <label for="state">State</label>
                                    <input type="text" id="state" name="state" placeholder="NY">
                                </div>
                                <div class="col-50">
                                    <label for="zip">Zip</label>
                                    <input type="text" id="zip" name="zip" placeholder="10001">
                                </div>
                            </div>
                        </div>
                        <div class="col-50">
                            <h3>Payment</h3>
                            <label>Accepted Cards</label>
                            <div style="margin-bottom:20px; padding:7px 0; font-size:24px;">
                                &#x1F4B3; &#x1F4B5;
                            </div>
                            <label for="cname">Name on Card</label>
                            <input type="text" id="cname" name="cardname" placeholder="John More Doe">
                            <label for="ccnum">Credit card number</label>
                            <input type="text" id="ccnum" name="cardnumber" placeholder="1111-2222-3333-4444" required>
                            <label for="expmonth">Exp Month</label>
                            <input type="text" id="expmonth" name="expmonth" placeholder="September">
                            <div class="row">
                                <div class="col-50">
                                    <label for="expyear">Exp Year</label>
                                    <input type="text" id="expyear" name="expyear" placeholder="2025">
                                </div>
                                <div class="col-50">
                                    <label for="cvv">CVV</label>
                                    <input type="text" id="cvv" name="cvv" placeholder="352">
                                </div>
                            </div>
                        </div>
                    </div>
                    <p>Total Amount<span class="price"><b>&#8377; <span th:text="${amountToPay}">0</span></b></span></p>
                    <input type="submit" value="Pay &amp; Place Order" class="btn">
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
