<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ========== PUBLIC NAVBAR (no login required) ========== -->
<nav th:fragment="public-nav" class="navbar navbar-expand-sm bg-dark">
    <a class="navbar-brand" th:href="@{/}">
        <img src="/websitelogo.png" alt="BookVerse Logo" width="42" height="42" style="border-radius:8px;">
        <span class="brand-name">BookVerse</span>
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/userlog}">Login</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/userreg}">Register</a></li>
        </ul>
    </div>
</nav>

<!-- ========== CUSTOMER NAVBAR ========== -->
<nav th:fragment="customer-nav" class="navbar navbar-expand-sm">
    <a class="navbar-brand" th:href="@{/userlog}">
        <img src="/websitelogo.png" alt="BookVerse Logo" width="42" height="42" style="border-radius:8px;">
        <span class="brand-name">BookVerse</span>
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'" th:href="@{/userlog}">Home</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'books'} ? 'active'" th:href="@{/viewbook}">Available Books</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'search'} ? 'active'" th:href="@{/searchbook}">&#128269; Search</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'cart'} ? 'active'" th:href="@{/cart}">&#128722; Cart</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'orders'} ? 'active'" th:href="@{/orders}">My Orders</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>

<!-- ========== SELLER/ADMIN NAVBAR ========== -->
<nav th:fragment="seller-nav" class="navbar navbar-expand-sm">
    <a class="navbar-brand" th:href="@{/storebooks}">
        <img src="/websitelogo.png" alt="BookVerse Logo" width="42" height="42" style="border-radius:8px;">
        <span class="brand-name">BookVerse Admin</span>
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'" th:href="@{/adminlog}">Home</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'storebooks'} ? 'active'" th:href="@{/storebooks}">Store Books</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'addbook'} ? 'active'" th:href="@{/addbook}">Add Books</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'removebook'} ? 'active'" th:href="@{/removebook}">Remove Books</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
        </ul>
    </div>
</nav>

<!-- ========== COMMON HEAD CONTENT ========== -->
<th:block th:fragment="common-head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
    <link rel="manifest" href="/favicons/site.webmanifest">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .btn-primary, .btn-success, .btn-info { background-color: #00d4ff; border: 2px solid #00d4ff; color: #1a1a2e; font-weight: 600; }
        .btn-primary:hover, .btn-success:hover, .btn-info:hover { background-color: #0fa8cc; border: 2px solid #0fa8cc; box-shadow: 0 4px 8px rgba(0, 212, 255, 0.3); }
        input[type="text"], input[type="password"], input[type="number"], input[type="email"], textarea, select { border: 2px solid #00d4ff !important; border-radius: 6px; }
        input[type="text"]:focus, input[type="password"]:focus, textarea:focus, select:focus { outline: none; box-shadow: 0 0 8px rgba(0, 212, 255, 0.5); border-color: #00d4ff; }
    </style>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/js/bootstrap.min.js"></script>
</th:block>

</html>
