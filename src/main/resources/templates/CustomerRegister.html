<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/layout :: common-head"></th:block>
    <title>BookVerse - Register</title>
</head>
<body>
<header>
    <nav class="navbar navbar-expand-sm bg-dark">
        <a class="navbar-brand" th:href="@{/}">
            <img src="/websitelogo.png" alt="BookVerse Logo" width="42" height="42" style="border-radius:8px;">
            <span class="brand-name">BookVerse</span>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/userlog}">Login</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/userreg}">Register</a></li>
            </ul>
        </div>
    </nav>
</header>

<div th:if="${errorMsg}" class="alert alert-danger text-center" th:text="${errorMsg}" style="max-width:500px; margin:10px auto;"></div>

<form th:action="@{/userreg}" method="post">
    <table class="tab">
        <tr><td><h2>Enter the Registration Details</h2></td></tr>
        <tr>
            <td>
                <label for="mailid">Email Id:</label>
                <input type="text" name="mailid" id="mailid" placeholder="Enter your Email" required><br>
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" placeholder="Enter Password" required><br>
                <label for="firstname">First Name:</label>
                <input type="text" name="firstname" id="firstname" placeholder="Enter your First Name" required><br>
                <label for="lastname">Last Name:</label>
                <input type="text" name="lastname" id="lastname" placeholder="Enter your Last Name" required><br>
                <label for="address">Address:</label>
                <input type="text" name="address" id="address" placeholder="Enter your Address"><br>
                <label for="phone">Phone:</label>
                <input type="text" name="phone" id="phone" placeholder="Enter Phone Number"><br>
                <input class="btn btn-primary my-2" type="submit" value="Register">
            </td>
        </tr>
        <tr><td><a th:href="@{/userlog}">Already registered? Login here</a></td></tr>
    </table>
</form>
</body>
</html>
